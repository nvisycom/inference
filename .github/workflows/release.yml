name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish Image
    runs-on: ubuntu-latest
    needs: create-release
    # Lockstep with the runtime: tag vX.Y.Z publishes both inference images.
    strategy:
      fail-fast: false
      matrix:
        service: [doctr, gliner, paddle]

    env:
      IMAGE: ghcr.io/nvisy/inference-${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync
        run: uv sync --locked --package nvisy-${{ matrix.service }}

      # BentoML builds the Bento from the service's Image config and generates
      # the Dockerfile (`--containerize`). The local image is tagged
      # nvisy-inference-<service>:<bento-version>; re-tag for GHCR and push.
      - name: Build and containerize
        id: bento
        run: |
          tag=$(uv run bentoml build \
            -f packages/nvisy-${{ matrix.service }}/bentofile.yaml \
            --containerize -o tag .)
          echo "image_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Tag and push
        run: |
          version="${GITHUB_REF#refs/tags/v}"   # e.g. 1.2.3
          IFS=. read -r major minor _ <<< "$version"
          for t in "$version" "$major.$minor" "$major" latest; do
            docker tag "${{ steps.bento.outputs.image_tag }}" "$IMAGE:$t"
            docker push "$IMAGE:$t"
          done
