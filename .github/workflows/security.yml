name: Security

on:
  push:
    branches:
      - "main"
      - "release"
    paths:
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  pull_request:
    branches:
      - "main"
      - "release"
    paths:
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.16"
          enable-cache: true

      - name: Export locked requirements
        run: uv export --locked --all-packages --no-emit-workspace --format requirements-txt -o requirements.txt

      - name: Audit dependencies
        run: uvx pip-audit -r requirements.txt
