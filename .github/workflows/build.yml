name: Build

on:
  push:
    branches:
      - "main"
      - "release"
    paths:
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build.yml"
  pull_request:
    branches:
      - "main"
      - "release"
    paths:
      - "packages/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-packages

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

      - name: OpenAPI specs up to date
        run: uv run python scripts/gen_openapi.py --check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync
        run: uv sync --locked --all-packages

      - name: Run tests
        run: uv run pytest
