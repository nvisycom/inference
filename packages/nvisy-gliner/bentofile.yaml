# Build from the repo root:  bentoml build -f packages/nvisy-gliner/bentofile.yaml .
# Image config (Python version, requirements) lives in service.py; this file
# selects the service and scopes the bundled source.
service: "nvisy_gliner.service:NerService"
include:
  - "packages/nvisy-gliner/**"
  - "packages/nvisy-core/**"
  - "pyproject.toml"
  - "uv.lock"
