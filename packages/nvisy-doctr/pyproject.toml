[project]
name = "nvisy-doctr"
version = "0.1.0"
description = "Default OCR inference service for nvisy (docTR)"
readme = "README.md"
requires-python = "==3.12.*"
license = "Apache-2.0"
authors = [{ name = "Nvisy" }]
dependencies = [
    "bentoml>=1.4.39,<2",
    "nvisy-core",
    "pillow>=10",
    "prometheus-client>=0.20",
    # docTR with the PyTorch backend; provides detection + recognition models.
    "python-doctr[torch]>=1.0,<2",
]

[build-system]
requires = ["uv_build>=0.6,<0.7"]
build-backend = "uv_build"

[tool.pytest.ini_options]
testpaths = ["tests"]
