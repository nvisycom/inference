[project]
name = "nvisy-vl"
version = "0.1.0"
description = "Vision-language OCR verification service for nvisy (PaddleOCR-VL)"
readme = "README.md"
requires-python = "==3.12.*"
license = "Apache-2.0"
authors = [{ name = "Nvisy" }]
dependencies = [
    "bentoml>=1.4.39,<2",
    "nvisy-core",
    # PaddleOCR-VL ships in the paddleocr package (>=3.5 for the VL pipeline).
    "paddleocr>=3.5,<4",
    "paddlepaddle>=3.0,<4",
    # The VL pipeline needs PaddleX's OCR extra (heavy OCR sub-dependencies);
    # without it PaddleOCRVL() raises a DependencyError at load.
    "paddlex[ocr]>=3.5,<4",
    "pillow>=10",
    "prometheus-client>=0.20",
]

[build-system]
requires = ["uv_build>=0.6,<0.7"]
build-backend = "uv_build"

[tool.pytest.ini_options]
testpaths = ["tests"]
