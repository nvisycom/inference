# Build from the repo root:  bentoml build -f packages/nvisy-ner/bentofile.yaml .
# Image config (Python version, requirements) lives in service.py; this file
# selects the service and scopes the bundled source.
service: "nvisy_ner.service:NerService"
include:
  - "packages/nvisy-ner/**"
  - "packages/nvisy-core/**"
  - "pyproject.toml"
  - "uv.lock"
