# Build from the repo root:  bentoml build -f packages/nvisy-ocr/bentofile.yaml .
# Image config (Python version, system packages, requirements) lives in
# service.py; this file selects the service and scopes the bundled source.
service: "nvisy_ocr.service:OcrService"
include:
  - "packages/nvisy-ocr/**"
  - "packages/nvisy-core/**"
  - "pyproject.toml"
  - "uv.lock"
